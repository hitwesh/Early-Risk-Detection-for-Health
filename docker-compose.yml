services:
  backend:
    build: ./backend
    container_name: health_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:///./health.db
      JWT_SECRET: supersecretkey
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      MODEL_PATH: /app/ai-model/disease_model.pt
    volumes:
      - ./backend:/app
      - ./ai-model:/app/ai-model
    restart: always
